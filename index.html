<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FÚTBOL TV PRO</title><link rel="manifest" href="manifest.json"><link rel="icon" href="icon.svg" type="image/svg+xml"><meta name="theme-color" content="#05070a"><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#1d232c,#05070a 60%);color:white;padding:16px;min-height:100vh}.app{max-width:520px;margin:auto}.header{text-align:center;padding:20px 0 12px}.logo{font-size:54px}h1{font-size:34px;margin:8px 0;background:linear-gradient(120deg,#fff,#8d959f,#fff);-webkit-background-clip:text;color:transparent}.sub{color:#cbd0d6}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0}.tab{padding:12px;border-radius:14px;border:1px solid #8d959f;background:#111820;color:#e8e8e8;font-weight:bold}.leagues{display:flex;overflow-x:auto;gap:8px;margin:12px 0;padding-bottom:6px}.league{min-width:120px;border:1px solid #cfd3d7;border-radius:16px;padding:12px;background:linear-gradient(135deg,#111,#222b35);color:white;font-weight:bold}.card{border:1px solid #8d959f;border-radius:20px;background:rgba(255,255,255,.06);padding:15px;margin:12px 0;box-shadow:0 8px 24px rgba(0,0,0,.45)}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.team{font-size:17px;font-weight:bold}.comp{color:#cfd3d7;font-size:13px;margin-bottom:7px}.time{font-size:23px;font-weight:bold;color:#f0f3f6}.channel{display:inline-block;margin-top:10px;padding:7px 10px;border-radius:10px;background:#0e1115;border:1px solid #cfd3d7;color:#fff;font-weight:bold}.star{font-size:26px;background:none;border:0;color:#cfd3d7}.small{color:#cbd0d6;font-size:13px;line-height:1.4}.btn{width:100%;padding:13px;border-radius:14px;border:0;background:linear-gradient(120deg,#fff,#aeb4bb,#fff);color:#05070a;font-weight:bold;margin-top:8px}.footer{font-size:12px;color:#aeb4bb;text-align:center;margin:18px 0}
</style></head><body><div class="app"><div class="header"><div class="logo">⚽</div><h1>FÚTBOL TV PRO</h1><div class="sub">Horarios · TV · Resultados</div></div><div class="tabs"><button class="tab" onclick="vista('hoy')">Hoy</button><button class="tab" onclick="vista('directo')">Directo</button><button class="tab" onclick="vista('favoritos')">Favoritos</button></div><div class="leagues"><button class="league" onclick="filtrar('LaLiga')">🇪🇸 LaLiga</button><button class="league" onclick="filtrar('Premier')">🏴 Premier</button><button class="league" onclick="filtrar('Champions')">⭐ Champions</button><button class="league" onclick="filtrar('Eurocopa')">🇪🇺 Eurocopa</button><button class="league" onclick="filtrar('Mundial')">🌍 Mundial</button></div><div class="card"><b>🔄 Actualización</b><div class="small">Preparada para datos en tiempo real. Esta primera versión trae modo demo y canales orientativos. Para datos reales hace falta conectar una API deportiva/TV.</div><button class="btn" onclick="actualizar()">Actualizar ahora</button></div><div id="contenido"></div><div class="footer">FÚTBOL TV PRO · versión inicial</div></div><script>
let filtro="Todos";let favs=JSON.parse(localStorage.getItem("futbolTvFavs")||"[]");const partidos=[{id:1,comp:"LaLiga",local:"Barcelona",visitante:"Athletic Club",hora:"18:30",canal:"DAZN / Movistar+",estado:"Hoy"},{id:2,comp:"Premier",local:"Manchester City",visitante:"Liverpool",hora:"16:00",canal:"DAZN",estado:"Hoy"},{id:3,comp:"Champions",local:"Real Madrid",visitante:"Borussia Dortmund",hora:"21:00",canal:"Movistar Liga de Campeones",estado:"Hoy"},{id:4,comp:"LaLiga",local:"Real Sociedad",visitante:"Villarreal",hora:"14:00",canal:"DAZN",estado:"Hoy"},{id:5,comp:"Eurocopa",local:"España",visitante:"Italia",hora:"20:45",canal:"RTVE / consultar operador",estado:"Próximo"},{id:6,comp:"Mundial",local:"Argentina",visitante:"Francia",hora:"22:00",canal:"RTVE / FIFA+ / consultar operador",estado:"Próximo"}];
function guardar(){localStorage.setItem("futbolTvFavs",JSON.stringify(favs))}function esFav(id){return favs.includes(id)}function toggleFav(id){esFav(id)?favs=favs.filter(x=>x!==id):favs.push(id);guardar();render(partidos)}function filtrar(x){filtro=x;render(partidos)}function vista(t){let l=partidos;if(t==="directo")l=partidos.filter(p=>p.estado==="En directo");if(t==="favoritos")l=partidos.filter(p=>esFav(p.id));render(l)}function render(lista){if(filtro!=="Todos")lista=lista.filter(p=>p.comp===filtro);const c=document.getElementById("contenido");if(!lista.length){c.innerHTML='<div class="card">No hay partidos para esta vista.</div>';return}c.innerHTML=lista.map(p=>`<div class="card"><div class="comp">${p.comp} · ${p.estado}</div><div class="row"><div class="team">${p.local}</div><div class="time">${p.hora}</div><div class="team" style="text-align:right">${p.visitante}</div></div><div class="channel">📺 ${p.canal}</div><button class="star" onclick="toggleFav(${p.id})">${esFav(p.id)?"⭐":"☆"}</button></div>`).join("")}function actualizar(){alert("Para tiempo real hay que conectar una API. Esta versión deja la app preparada.");render(partidos)}render(partidos);
</script></body></html>
